name: medicalcv
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.10
  
  # Core scientific packages
  - numpy>=1.21.0
  - pandas>=1.4.0
  - scipy>=1.8.0
  
  # Machine learning
  - scikit-learn>=1.2.0
  - imbalanced-learn>=0.10.0
  
  # Visualization
  - matplotlib>=3.5.0
  - seaborn>=0.12.0
  - plotly>=5.11.0
  
  # Jupyter and notebooks
  - jupyter>=1.0.0
  - jupyterlab>=3.5.0
  - notebook>=6.5.0
  - ipywidgets>=8.0.0
  - nbconvert>=7.0.0
  
  # Development tools
  - pytest>=7.2.0
  - pytest-cov>=4.0.0
  - black>=22.10.0
  - flake8>=6.0.0
  - mypy>=0.991
  - isort>=5.11.0
  
  # Documentation
  - sphinx>=5.3.0
  - sphinx-rtd-theme>=1.1.0
  
  # Additional useful packages
  - tqdm>=4.64.0
  - joblib>=1.2.0
  - pip>=22.3
  
  # Pip-only packages
  - pip:
    - bandit>=1.7.4
    - safety>=2.3.0